<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Portofolio | Developer Kreatif</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons (alternatif karena React Icons butuh npm, kita pakai CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts untuk tampilan lebih baik -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- React & ReactDOM CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- Babel untuk JSX -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        html {
            scroll-behavior: smooth;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2563eb;
        }
        /* Animasi fade-in sederhana */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Root element untuk React -->
    <div id="root"></div>

    <script type="text/babel">
        // ========== KOMPONEN PORTOFOLIO ==========
        
        // Data Proyek (bisa ditambah)
        const projectsData = [
            {
                id: 1,
                title: "Aplikasi Cuaca Real-time",
                description: "Menampilkan cuaca terkini berdasarkan lokasi pengguna menggunakan OpenWeatherMap API.",
                image: "https://picsum.photos/id/104/400/300",
                tech: "React, Tailwind, API",
                icon: "fas fa-cloud-sun"
            },
            {
                id: 2,
                title: "Task Manager Pro",
                description: "Kelola tugas harian dengan drag & drop, deadline, dan notifikasi local storage.",
                image: "https://picsum.photos/id/20/400/300",
                tech: "Next.js, Tailwind, DnD",
                icon: "fas fa-tasks"
            },
            {
                id: 3,
                title: "Landing Page UMKM",
                description: "Landing page modern untuk bisnis kecil dengan animasi scroll dan form kontak.",
                image: "https://picsum.photos/id/26/400/300",
                tech: "HTML, Tailwind, JS",
                icon: "fas fa-store"
            },
            {
                id: 4,
                title: "Dashboard Analytics",
                description: "Dashboard interaktif dengan chart.js untuk visualisasi data penjualan.",
                image: "https://picsum.photos/id/0/400/300",
                tech: "React, Chart.js, Tailwind",
                icon: "fas fa-chart-line"
            }
        ];

        // Komponen Navbar (Responsive + Mobile Menu)
        const Navbar = () => {
            const [isOpen, setIsOpen] = React.useState(false);
            
            const menuItems = [
                { name: "Beranda", href: "#home" },
                { name: "Tentang", href: "#about" },
                { name: "Proyek", href: "#projects" },
                { name: "Keahlian", href: "#skills" },
                { name: "Kontak", href: "#contact" }
            ];
            
            return (
                <nav className="bg-white shadow-md sticky top-0 z-50 backdrop-blur-sm bg-white/90">
                    <div className="container mx-auto px-4 sm:px-6 py-3 flex justify-between items-center">
                        {/* Logo */}
                        <a href="#home" className="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">
                            DevPort
                        </a>
                        
                        {/* Desktop Menu */}
                        <div className="hidden md:flex space-x-8">
                            {menuItems.map(item => (
                                <a key={item.name} href={item.href} className="font-medium hover:text-blue-600 transition duration-300">
                                    {item.name}
                                </a>
                            ))}
                        </div>
                        
                        {/* Mobile Menu Button */}
                        <button 
                            onClick={() => setIsOpen(!isOpen)}
                            className="md:hidden text-2xl focus:outline-none"
                        >
                            {isOpen ? <i className="fas fa-times"></i> : <i className="fas fa-bars"></i>}
                        </button>
                    </div>
                    
                    {/* Mobile Menu Dropdown */}
                    {isOpen && (
                        <div className="md:hidden bg-white border-t py-4 px-4 flex flex-col space-y-3 animate-fade-up">
                            {menuItems.map(item => (
                                <a 
                                    key={item.name} 
                                    href={item.href} 
                                    onClick={() => setIsOpen(false)}
                                    className="font-medium hover:text-blue-600 transition py-2"
                                >
                                    {item.name}
                                </a>
                            ))}
                        </div>
                    )}
                </nav>
            );
        };
        
        // Hero Section
        const Hero = () => {
            return (
                <section id="home" className="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 px-4">
                    <div className="text-center max-w-3xl mx-auto">
                        <div className="animate-fade-up">
                            <div className="inline-block p-1 rounded-full bg-gradient-to-r from-blue-500 to-indigo-500 mb-4">
                                <div className="bg-white rounded-full p-1">
                                    <img 
                                        src="https://randomuser.me/api/portraits/men/32.jpg" 
                                        alt="Profile" 
                                        className="w-28 h-28 rounded-full object-cover border-4 border-white"
                                    />
                                </div>
                            </div>
                            <h1 className="text-4xl md:text-6xl font-extrabold mb-4 bg-gradient-to-r from-blue-700 to-indigo-700 bg-clip-text text-transparent">
                                Ahmad Fauzi
                            </h1>
                            <p className="text-xl md:text-2xl text-gray-600 mb-2">Frontend Developer & UI Enthusiast</p>
                            <p className="text-gray-500 max-w-md mx-auto mb-8">
                                Membangun pengalaman web yang responsif, interaktif, dan modern dengan React & Tailwind.
                            </p>
                            <div className="flex justify-center gap-4">
                                <a href="#projects" className="px-6 py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition shadow-md hover:shadow-xl transform hover:-translate-y-1 duration-300">
                                    Lihat Proyek
                                </a>
                                <a href="#contact" className="px-6 py-3 border-2 border-blue-600 text-blue-600 rounded-lg font-semibold hover:bg-blue-50 transition">
                                    Hubungi Saya
                                </a>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };
        
        // About Section
        const About = () => {
            return (
                <section id="about" className="py-20 px-4 bg-white">
                    <div className="container mx-auto max-w-5xl">
                        <div className="text-center mb-12">
                            <h2 className="text-3xl md:text-4xl font-bold mb-3">Tentang Saya</h2>
                            <div className="w-20 h-1 bg-blue-500 mx-auto rounded-full"></div>
                        </div>
                        <div className="flex flex-col md:flex-row gap-10 items-center">
                            <div className="md:w-1/2 animate-fade-up">
                                <img 
                                    src="https://picsum.photos/id/91/500/400" 
                                    alt="Working" 
                                    className="rounded-2xl shadow-xl object-cover w-full h-80"
                                />
                            </div>
                            <div className="md:w-1/2 space-y-4 animate-fade-up delay-100">
                                <p className="text-gray-600 leading-relaxed">
                                    Saya adalah pengembang frontend dengan pengalaman 3+ tahun dalam membangun aplikasi web responsif. 
                                    Berpengalaman dalam React.js, Tailwind CSS, dan berbagai library modern.
                                </p>
                                <p className="text-gray-600 leading-relaxed">
                                    Saya sangat antusias dengan desain UI/UX yang menarik dan performa web yang cepat. 
                                    Saat ini fokus mengembangkan solusi digital yang membantu bisnis berkembang.
                                </p>
                                <div className="pt-4">
                                    <div className="flex items-center gap-3 text-gray-700">
                                        <i className="fas fa-map-marker-alt text-blue-500"></i>
                                        <span>Jakarta, Indonesia</span>
                                    </div>
                                    <div className="flex items-center gap-3 text-gray-700 mt-2">
                                        <i className="fas fa-envelope text-blue-500"></i>
                                        <span>ahmad.fauzi@example.com</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };
        
        // Projects Section (Card dengan hover effect)
        const Projects = () => {
            const [hoveredId, setHoveredId] = React.useState(null);
            
            return (
                <section id="projects" className="py-20 px-4 bg-gray-50">
                    <div className="container mx-auto max-w-6xl">
                        <div className="text-center mb-12">
                            <h2 className="text-3xl md:text-4xl font-bold mb-3">Proyek Unggulan</h2>
                            <div className="w-20 h-1 bg-blue-500 mx-auto rounded-full"></div>
                            <p className="text-gray-500 mt-4 max-w-2xl mx-auto">
                                Beberapa proyek yang telah saya kerjakan, dari aplikasi web hingga landing page interaktif.
                            </p>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {projectsData.map((project, idx) => (
                                <div 
                                    key={project.id}
                                    className={`bg-white rounded-xl overflow-hidden shadow-lg transition-all duration-300 transform hover:-translate-y-2 hover:shadow-2xl cursor-pointer ${hoveredId === project.id ? 'scale-[1.02]' : ''}`}
                                    onMouseEnter={() => setHoveredId(project.id)}
                                    onMouseLeave={() => setHoveredId(null)}
                                    style={{ animationDelay: `${idx * 0.1}s` }}
                                    className="bg-white rounded-xl overflow-hidden shadow-lg transition-all duration-300 hover:-translate-y-2 hover:shadow-2xl"
                                >
                                    <div className="relative overflow-hidden h-48">
                                        <img 
                                            src={project.image} 
                                            alt={project.title}
                                            className="w-full h-full object-cover transition-transform duration-500 hover:scale-110"
                                        />
                                        <div className="absolute top-3 right-3 bg-white/90 backdrop-blur-sm p-2 rounded-full">
                                            <i className={`${project.icon} text-blue-600`}></i>
                                        </div>
                                    </div>
                                    <div className="p-5">
                                        <h3 className="text-xl font-bold mb-2">{project.title}</h3>
                                        <p className="text-gray-600 text-sm mb-3">{project.description}</p>
                                        <div className="flex flex-wrap gap-2 mb-4">
                                            {project.tech.split(', ').map((tech, i) => (
                                                <span key={i} className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded-full">
                                                    {tech}
                                                </span>
                                            ))}
                                        </div>
                                        <button className="text-blue-600 font-semibold flex items-center gap-1 hover:gap-2 transition-all">
                                            Lihat Detail <i className="fas fa-arrow-right text-sm"></i>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };
        
        // Skills Section (dengan progress bar interaktif)
        const Skills = () => {
            const skillsList = [
                { name: "React.js", level: 90, icon: "fab fa-react" },
                { name: "Tailwind CSS", level: 88, icon: "fab fa-css3-alt" },
                { name: "JavaScript (ES6+)", level: 85, icon: "fab fa-js" },
                { name: "Node.js / Express", level: 75, icon: "fab fa-node" },
                { name: "UI/UX Design", level: 70, icon: "fas fa-paint-brush" },
                { name: "Git & Github", level: 82, icon: "fab fa-git-alt" }
            ];
            
            return (
                <section id="skills" className="py-20 px-4 bg-white">
                    <div className="container mx-auto max-w-4xl">
                        <div className="text-center mb-12">
                            <h2 className="text-3xl md:text-4xl font-bold mb-3">Keahlian & Tools</h2>
                            <div className="w-20 h-1 bg-blue-500 mx-auto rounded-full"></div>
                        </div>
                        
                        <div className="grid md:grid-cols-2 gap-8">
                            {skillsList.map((skill, idx) => (
                                <div key={idx} className="animate-fade-up" style={{animationDelay: `${idx * 0.05}s`}}>
                                    <div className="flex justify-between items-center mb-2">
                                        <div className="flex items-center gap-2">
                                            <i className={`${skill.icon} text-blue-600 text-xl`}></i>
                                            <span className="font-semibold text-gray-700">{skill.name}</span>
                                        </div>
                                        <span className="text-sm text-blue-600 font-medium">{skill.level}%</span>
                                    </div>
                                    <div className="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                                        <div 
                                            className="bg-gradient-to-r from-blue-500 to-indigo-600 h-2.5 rounded-full transition-all duration-1000 ease-out"
                                            style={{ width: `${skill.level}%` }}
                                        ></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        <div className="mt-16 flex flex-wrap justify-center gap-6">
                            <div className="text-center group">
                                <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-2 group-hover:bg-blue-200 transition">
                                    <i className="fab fa-figma text-3xl text-blue-600"></i>
                                </div>
                                <span className="text-sm">Figma</span>
                            </div>
                            <div className="text-center group">
                                <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-2 group-hover:bg-blue-200 transition">
                                    <i className="fab fa-github text-3xl text-blue-600"></i>
                                </div>
                                <span className="text-sm">Github</span>
                            </div>
                            <div className="text-center group">
                                <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-2 group-hover:bg-blue-200 transition">
                                    <i className="fab fa-vuejs text-3xl text-blue-600"></i>
                                </div>
                                <span className="text-sm">Vue.js</span>
                            </div>
                            <div className="text-center group">
                                <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-2 group-hover:bg-blue-200 transition">
                                    <i className="fas fa-database text-3xl text-blue-600"></i>
                                </div>
                                <span className="text-sm">MongoDB</span>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };
        
        // Contact Section dengan form sederhana
        const Contact = () => {
            const [formData, setFormData] = React.useState({ name: '', email: '', message: '' });
            const [submitted, setSubmitted] = React.useState(false);
            
            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };
            
            const handleSubmit = (e) => {
                e.preventDefault();
                // Simulasi pengiriman
                console.log('Form submitted:', formData);
                setSubmitted(true);
                setTimeout(() => setSubmitted(false), 3000);
                setFormData({ name: '', email: '', message: '' });
            };
            
            return (
                <section id="contact" className="py-20 px-4 bg-gradient-to-br from-gray-50 to-blue-50">
                    <div className="container mx-auto max-w-5xl">
                        <div className="text-center mb-12">
                            <h2 className="text-3xl md:text-4xl font-bold mb-3">Hubungi Saya</h2>
                            <div className="w-20 h-1 bg-blue-500 mx-auto rounded-full"></div>
                            <p className="text-gray-500 mt-4">Tertarik untuk berkolaborasi? Kirim pesan!</p>
                        </div>
                        
                        <div className="flex flex-col md:flex-row gap-10">
                            <div className="md:w-1/2 space-y-6">
                                <div className="flex items-center gap-4 p-4 bg-white rounded-xl shadow-sm">
                                    <i className="fas fa-envelope text-2xl text-blue-500"></i>
                                    <div>
                                        <h4 className="font-semibold">Email</h4>
                                        <p className="text-gray-600">hello@ahmadfauzi.com</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-4 p-4 bg-white rounded-xl shadow-sm">
                                    <i className="fab fa-whatsapp text-2xl text-green-500"></i>
                                    <div>
                                        <h4 className="font-semibold">WhatsApp</h4>
                                        <p className="text-gray-600">+62 812 3456 7890</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-4 p-4 bg-white rounded-xl shadow-sm">
                                    <i className="fab fa-linkedin text-2xl text-blue-700"></i>
                                    <div>
                                        <h4 className="font-semibold">LinkedIn</h4>
                                        <p className="text-gray-600">/in/ahmadfauzi</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="md:w-1/2">
                                <form onSubmit={handleSubmit} className="bg-white p-6 rounded-2xl shadow-xl">
                                    <div className="mb-4">
                                        <label className="block text-gray-700 font-medium mb-2">Nama</label>
                                        <input 
                                            type="text" 
                                            name="name"
                                            value={formData.name}
                                            onChange={handleChange}
                                            required
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
                                            placeholder="Nama lengkap"
                                        />
                                    </div>
                                    <div className="mb-4">
                                        <label className="block text-gray-700 font-medium mb-2">Email</label>
                                        <input 
                                            type="email" 
                                            name="email"
                                            value={formData.email}
                                            onChange={handleChange}
                                            required
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
                                            placeholder="email@contoh.com"
                                        />
                                    </div>
                                    <div className="mb-4">
                                        <label className="block text-gray-700 font-medium mb-2">Pesan</label>
                                        <textarea 
                                            name="message"
                                            value={formData.message}
                                            onChange={handleChange}
                                            required
                                            rows="4"
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
                                            placeholder="Tulis pesan Anda..."
                                        ></textarea>
                                    </div>
                                    <button 
                                        type="submit"
                                        className="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition transform hover:-translate-y-0.5 duration-200 shadow-md"
                                    >
                                        Kirim Pesan
                                    </button>
                                    {submitted && (
                                        <div className="mt-4 text-green-600 text-center font-medium animate-fade-up">
                                            ✅ Pesan terkirim! Saya akan segera merespon.
                                        </div>
                                    )}
                                </form>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };
        
        // Footer
        const Footer = () => {
            return (
                <footer className="bg-gray-900 text-white py-8 px-4">
                    <div className="container mx-auto text-center">
                        <div className="flex justify-center space-x-6 mb-4">
                            <a href="#" className="text-gray-400 hover:text-white text-xl transition"><i className="fab fa-github"></i></a>
                            <a href="#" className="text-gray-400 hover:text-white text-xl transition"><i className="fab fa-linkedin"></i></a>
                            <a href="#" className="text-gray-400 hover:text-white text-xl transition"><i className="fab fa-twitter"></i></a>
                            <a href="#" className="text-gray-400 hover:text-white text-xl transition"><i className="fab fa-instagram"></i></a>
                        </div>
                        <p className="text-gray-400 text-sm">
                            &copy; 2026 Ahmad Fauzi | Dibangun dengan React & Tailwind CSS
                        </p>
                    </div>
                </footer>
            );
        };
        
        // Komponen Utama App
        const App = () => {
            return (
                <div className="overflow-x-hidden">
                    <Navbar />
                    <Hero />
                    <About />
                    <Projects />
                    <Skills />
                    <Contact />
                    <Footer />
                </div>
            );
        };
        
        // Render ke root
        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
