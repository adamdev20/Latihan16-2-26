<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pro Portfolio</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background: #060912; }
    .glow { text-shadow: 0 0 12px rgba(59,130,246,0.9); }
  </style>
</head>

<body class="text-white">
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

/* Typing */
function useTyping(text, speed=55){
  const [out, setOut] = useState("");

  useEffect(()=>{
    let i = 0;
    const t = setInterval(()=>{
      setOut(text.slice(0, i));
      i++;
      if(i > text.length) clearInterval(t);
    }, speed);
    return ()=>clearInterval(t);
  }, [text]);

  return out;
}

/* Navbar */
function Navbar({open, setOpen}){
  return (
    <div className="fixed top-0 w-full bg-black/40 backdrop-blur border-b border-blue-500/10 z-50">
      <div className="max-w-5xl mx-auto flex justify-between items-center p-4">
        <h1 className="text-blue-400 font-bold glow">Adam.dev</h1>

        <div className="hidden md:flex gap-6 text-sm text-gray-300">
          <a href="#home" className="hover:text-blue-400">Home</a>
          <a href="#about" className="hover:text-blue-400">About</a>
          <a href="#project" className="hover:text-blue-400">Projects</a>
          <a href="#contact" className="hover:text-blue-400">Contact</a>
        </div>

        <button onClick={()=>setOpen(!open)} className="md:hidden text-blue-400">
          ☰
        </button>
      </div>

      {open && (
        <div className="md:hidden px-6 pb-4 flex flex-col gap-2 text-sm text-gray-300">
          <a href="#home">Home</a>
          <a href="#about">About</a>
          <a href="#project">Projects</a>
          <a href="#contact">Contact</a>
        </div>
      )}
    </div>
  );
}

/* Hero */
function Hero(){
  const text = useTyping("Hi, I'm Adam Snyder", 60);

  return (
    <section id="home" className="h-screen flex items-center justify-center text-center px-6">
      <div>
        <h1 className="text-4xl md:text-6xl font-bold text-blue-400 glow">
          {text}
        </h1>

        <p className="text-gray-400 mt-4 text-sm md:text-base">
          Clean UI • Scalable Frontend • Modern Web Experience
        </p>

        <a href="#project"
           className="inline-block mt-7 px-6 py-3 bg-blue-600 rounded-xl hover:scale-105 transition shadow-lg shadow-blue-500/20">
          Explore Projects
        </a>
      </div>
    </section>
  );
}

/* About PRO */
function About(){
  return (
    <section id="about" className="max-w-5xl mx-auto px-6 py-20">
      <h2 className="text-blue-400 text-xl font-bold mb-6">About</h2>

      <div className="grid md:grid-cols-2 gap-6">
        
        <div className="bg-white/5 border border-blue-500/10 rounded-xl p-6">
          <p className="text-gray-300 leading-relaxed">
            Saya frontend developer yang fokus membangun interface modern,
            responsive, dan user-friendly. Saya suka desain minimal tapi terasa premium.
          </p>

          <p className="text-gray-400 mt-4 text-sm">
            Saat ini saya mendalami React ecosystem, UI animation, dan frontend architecture.
          </p>
        </div>

        <div className="bg-black/30 border border-blue-500/10 rounded-xl p-6">
          <h3 className="text-blue-300 font-semibold mb-3">Tech Stack</h3>

          <div className="flex flex-wrap gap-2 text-xs">
            {["React","Tailwind","JavaScript","HTML","Git","UI Design"].map((s)=>(
              <span key={s}
                className="px-3 py-1 bg-blue-600/20 border border-blue-500/10 rounded-lg">
                {s}
              </span>
            ))}
          </div>
        </div>

      </div>
    </section>
  );
}

/* Project PRO */
function Project(){
  const project = {
    name: "Cyber Portfolio v2",
    desc: "A modern responsive portfolio built with React + Tailwind focusing on clean UI, performance, and smooth UX.",
    github: "https://github.com/username/project",
    demo: "https://project-demo.vercel.app"
  };

  return (
    <section id="project" className="max-w-5xl mx-auto px-6 py-10">
      <h2 className="text-blue-400 text-xl font-bold mb-6">Project</h2>

      <div className="bg-white/5 border border-blue-500/10 rounded-xl p-6 hover:scale-[1.02] transition">

        <div className="flex justify-between items-start">
          <h3 className="text-blue-300 font-bold">{project.name}</h3>
          <span className="text-xs text-gray-500">Featured</span>
        </div>

        <p className="text-gray-400 mt-3 text-sm leading-relaxed">
          {project.desc}
        </p>

        <div className="mt-4 flex flex-wrap gap-2 text-xs">
          <span className="px-3 py-1 bg-blue-600/20 rounded-lg">React</span>
          <span className="px-3 py-1 bg-blue-600/20 rounded-lg">Tailwind</span>
          <span className="px-3 py-1 bg-blue-600/20 rounded-lg">Responsive</span>
        </div>

        <div className="mt-6 flex gap-4 text-sm">
          <a
            href={project.github}
            target="_blank"
            className="px-4 py-2 border border-blue-500/30 rounded-lg hover:bg-blue-600/20 transition"
          >
            GitHub
          </a>

          <a
            href={project.demo}
            target="_blank"
            className="px-4 py-2 bg-blue-600 rounded-lg hover:scale-105 transition shadow-md shadow-blue-500/20"
          >
            Live Demo
          </a>
        </div>

      </div>
    </section>
  );
}

/* Contact PRO */
function Contact(){
  return (
    <section id="contact" className="max-w-4xl mx-auto px-6 py-20">
      <h2 className="text-blue-400 text-xl font-bold mb-4">Contact</h2>

      <div className="bg-white/5 border border-blue-500/10 rounded-xl p-6">
        
        <div className="flex flex-col gap-3 text-sm">

          <div className="flex justify-between items-center bg-black/30 p-3 rounded-lg">
            <span className="text-gray-300">Email</span>
            <span className="text-blue-400">youremail@gmail.com</span>
          </div>

          <div className="flex justify-between items-center bg-black/30 p-3 rounded-lg">
            <span className="text-gray-300">WhatsApp</span>
            <span className="text-blue-400">+62 8xx-xxxx-xxxx</span>
          </div>

        </div>

      </div>
    </section>
  );
}

/* App */
function App(){
  const [open, setOpen] = useState(false);

  return (
    <>
      <Navbar open={open} setOpen={setOpen}/>
      <Hero/>
      <About/>
      <Project/>
      <Contact/>

      <footer className="text-center text-gray-600 py-10 text-xs">
        © 2026 Adam.dev — Built with React + Tailwind
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
