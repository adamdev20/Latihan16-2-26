<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adam Snyder</title>

<script src="https://cdn.tailwindcss.com"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<style>

body{
background:#020617;
overflow-x:hidden;
}

.gradient-bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%,#22c55e22,transparent),
radial-gradient(circle at 80% 60%,#3b82f622,transparent);
z-index:-1;
animation:moveBg 12s infinite alternate ease-in-out;
}

@keyframes moveBg{
0%{transform:translateY(0)}
100%{transform:translateY(-40px)}
}

.cursor{
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0}
}

.glow:hover{
box-shadow:0 0 25px #22c55e55;
}

</style>

</head>

<body>

<div class="gradient-bg"></div>

<div id="root"></div>

<script type="text/babel">

function App(){

const [text,setText]=React.useState("")
const message="$ Hello, I'm Adam Snyder"
const [terminal,setTerminal]=React.useState("")

React.useEffect(()=>{

let i=0

let typing=setInterval(()=>{

setText(message.slice(0,i))

i++

if(i>message.length){
clearInterval(typing)
}

},60)

},[])



function runCommand(cmd){

if(cmd==="help"){

setTerminal("Available commands: about, projects, contact")

}

else if(cmd==="about"){

setTerminal("Saya belajar web development & system exploration.")

}

else if(cmd==="projects"){

setTerminal("Landing page | deployment practice | system experiment")

}

else if(cmd==="contact"){

setTerminal("Email: your@email.com")

}

else{

setTerminal("command not found")

}

}



return(

<div className="text-white min-h-screen">

{/* NAVBAR */}

<nav className="flex justify-between px-10 py-6 backdrop-blur-lg sticky top-0">

<h1 className="font-semibold tracking-widest">

Adam Snyder

</h1>


<div className="space-x-6 text-slate-400">

<a href="#about" className="hover:text-white">About</a>

<a href="#projects" className="hover:text-white">Projects</a>

<a href="#terminal" className="hover:text-white">Terminal</a>

<a href="#contact" className="hover:text-white">Contact</a>

</div>

</nav>


{/* HERO */}

<section className="px-10 pt-40 max-w-4xl">

<h1 className="text-6xl font-bold text-green-400">

{text}

<span className="cursor">_</span>

</h1>


<p className="text-slate-400 mt-6 max-w-xl">

Saya sedang membangun skill di web development dan eksplorasi sistem komputer.

</p>

</section>



{/* ABOUT */}

<section id="about" className="px-10 py-32 max-w-4xl">

<h2 className="text-2xl mb-6">

About

</h2>


<div className="bg-slate-900/60 backdrop-blur-xl p-8 rounded-2xl glow transition">

Tertarik memahami sistem komputer dari level dasar sampai deployment modern.

</div>

</section>



{/* PROJECTS */}

<section id="projects" className="px-10 pb-32 max-w-4xl">

<h2 className="text-2xl mb-6">

Projects

</h2>


<div className="grid md:grid-cols-3 gap-6">


<div className="bg-slate-900/60 p-8 rounded-2xl glow transition">

Landing Page HTML CSS

</div>


<div className="bg-slate-900/60 p-8 rounded-2xl glow transition">

Deployment Practice

</div>


<div className="bg-slate-900/60 p-8 rounded-2xl glow transition">

System Experiment

</div>


</div>

</section>



{/* TERMINAL */}

<section id="terminal" className="px-10 pb-32 max-w-4xl">

<h2 className="text-2xl mb-6">

Interactive Terminal

</h2>


<div className="bg-black p-8 rounded-xl font-mono">

<div className="text-green-400">

$ type a command:

</div>


<div className="space-x-2 mt-4">

<button onClick={()=>runCommand("help")}>help</button>

<button onClick={()=>runCommand("about")}>about</button>

<button onClick={()=>runCommand("projects")}>projects</button>

<button onClick={()=>runCommand("contact")}>contact</button>

</div>


<div className="text-green-400 mt-4">

{terminal}

</div>

</div>

</section>



{/* CONTACT */}

<section id="contact" className="px-10 pb-32 max-w-4xl">

<h2 className="text-2xl mb-6">

Contact

</h2>


<div className="bg-slate-900/60 backdrop-blur-xl p-8 rounded-2xl glow transition">

Email: your@email.com

</div>

</section>


<footer className="text-center text-slate-500 pb-10">

© 2026 Adam Snyder

</footer>

</div>

)

}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
