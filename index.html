<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minicraft Portfolio Interactive</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: monospace;
}

/* BACKGROUND */
body{
    background: linear-gradient(#7ec850,#4f7d33,#2f4f1f);
    min-height:100vh;
    color:white;
}

/* TOP */
.topbar{
    background:#222;
    padding:10px;
    text-align:center;
    border-bottom:4px solid #000;
}

/* LAYOUT */
.container{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    padding:20px;
}

/* BLOCK */
.block{
    width:300px;
    background:#8b8b8b;
    border:4px solid #333;
    box-shadow:4px 4px 0 #000;
    padding:10px;
}

.block h3{
    background:#444;
    margin:-10px -10px 10px -10px;
    padding:6px;
    border-bottom:3px solid #000;
}

/* BUTTON */
.btn{
    margin-top:8px;
    background:#3b7c2a;
    padding:6px;
    text-align:center;
    cursor:pointer;
    border:2px solid #1f3d14;
    box-shadow:2px 2px 0 #000;
}

.btn:hover{
    background:#4caf50;
}

/* INVENTORY BLOCKS */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:5px;
    margin-top:10px;
}

.slot{
    height:45px;
    background:#666;
    border:3px solid #222;
    box-shadow:inset 2px 2px 0 #aaa;
    cursor:pointer;
    transition:0.2s;
}

.slot:hover{
    background:#888;
    transform:scale(1.05);
}

/* TERMINAL */
.terminal{
    background:black;
    color:#00ff99;
    padding:10px;
    margin-top:10px;
    height:160px;
    overflow:auto;
    border:3px inset #555;
}

/* INPUT */
input{
    width:100%;
    padding:6px;
    margin-top:5px;
    border:2px solid #000;
    background:#111;
    color:#00ff99;
    outline:none;
}

/* HERO */
.hero{
    text-align:center;
    padding:15px;
}

.hero h1{
    text-shadow:2px 2px 0 #000;
}

/* MOBILE */
@media(max-width:768px){
    .block{width:100%;}
}
</style>
</head>

<body>

<div class="topbar">
🟩 MINICRAFT INTERACTIVE WORLD - $adamsnyder
</div>

<div class="hero">
    <h1>WELCOME PLAYER</h1>
    <p>Type commands in console below</p>
</div>

<div class="container">

    <!-- ABOUT -->
    <div class="block">
        <h3>ABOUT</h3>
        <p>Player: Adam Snyder</p>
        <p>Class: Web Builder</p>
        <p>Status: Online</p>
    </div>

    <!-- INVENTORY -->
    <div class="block">
        <h3>INVENTORY (click block)</h3>

        <div class="grid">
            <div class="slot" onclick="clickBlock(this)"></div>
            <div class="slot" onclick="clickBlock(this)"></div>
            <div class="slot" onclick="clickBlock(this)"></div>
            <div class="slot" onclick="clickBlock(this)"></div>
            <div class="slot" onclick="clickBlock(this)"></div>
            <div class="slot" onclick="clickBlock(this)"></div>
        </div>

        <div class="btn" onclick="breakAll()">Break All Blocks</div>
    </div>

    <!-- TERMINAL -->
    <div class="block">
        <h3>CONSOLE</h3>

        <div class="terminal" id="terminal">
$adamsnyder@mc:~$ welcome  
system loaded...  
type "help" for commands  
        </div>

        <input id="cmd" placeholder="type command..." onkeydown="handleKey(event)">
    </div>

</div>

<script>

const terminal = document.getElementById("terminal");

/* TYPE EFFECT */
function typeLine(text){
    let i = 0;
    let line = document.createElement("div");
    terminal.appendChild(line);

    let interval = setInterval(()=>{
        line.innerHTML += text[i];
        i++;
        terminal.scrollTop = terminal.scrollHeight;

        if(i >= text.length){
            clearInterval(interval);
        }
    },30);
}

/* COMMAND SYSTEM */
function handleKey(e){
    if(e.key === "Enter"){
        let cmd = e.target.value;
        e.target.value = "";

        terminal.innerHTML += "\n$adamsnyder@mc:~$ " + cmd;

        if(cmd === "help"){
            typeLine("commands: help, status, clear, build");
        }
        else if(cmd === "status"){
            typeLine("All systems online ✔");
        }
        else if(cmd === "clear"){
            terminal.innerHTML = "";
        }
        else if(cmd === "build"){
            typeLine("Building world... ████████ 100%");
        }
        else{
            typeLine("unknown command: " + cmd);
        }
    }
}

/* BLOCK CLICK EFFECT */
function clickBlock(el){
    el.style.background = "#ffcc00";
    el.innerText = "★";
    setTimeout(()=>{
        el.style.background = "#666";
        el.innerText = "";
    },500);
}

/* BREAK ALL */
function breakAll(){
    document.querySelectorAll(".slot").forEach((b)=>{
        b.style.background="#222";
        b.innerText="X";
    });

    setTimeout(()=>{
        document.querySelectorAll(".slot").forEach((b)=>{
            b.style.background="#666";
            b.innerText="";
        });
    },1000);
}

</script>

</body>
</html>
